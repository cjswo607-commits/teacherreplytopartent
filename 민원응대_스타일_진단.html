<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학부모 민원 응대 스타일 진단검사</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --teal-dark: #2D7D7D;
    --teal: #3A9E9E;
    --teal-light: #A8D8D8;
    --teal-xlight: #E6F4F4;
    --sage: #7BAE8C;
    --sage-light: #D4EAD9;
    --warm: #F5EDE0;
    --warm-mid: #E8D5C0;
    --text-dark: #2B3340;
    --text-mid: #5A6473;
    --text-light: #8A939E;
    --white: #FFFFFF;
    --shadow-sm: 0 2px 8px rgba(45,125,125,0.08);
    --shadow-md: 0 6px 24px rgba(45,125,125,0.12);
    --shadow-lg: 0 12px 40px rgba(45,125,125,0.16);
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: linear-gradient(150deg, #EAF6F6 0%, #F5EDE0 60%, #E6F4F4 100%);
    min-height: 100vh;
    color: var(--text-dark);
    line-height: 1.6;
  }

  /* ─── SCREEN SYSTEM ─── */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 16px; }

  /* ─── LANDING ─── */
  #screen-landing {
    background: linear-gradient(160deg, var(--teal-xlight) 0%, var(--warm) 100%);
  }

  .landing-card {
    background: var(--white);
    border-radius: 24px;
    padding: 52px 44px;
    max-width: 520px;
    width: 100%;
    box-shadow: var(--shadow-lg);
    text-align: center;
  }

  .landing-icon {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--teal), var(--sage));
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 28px;
    font-size: 32px;
  }

  .landing-eyebrow {
    font-size: 12px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--teal); margin-bottom: 12px;
  }

  .landing-title {
    font-size: 26px; font-weight: 700;
    color: var(--text-dark); line-height: 1.35;
    margin-bottom: 16px;
  }

  .landing-desc {
    font-size: 14.5px; color: var(--text-mid);
    line-height: 1.75; margin-bottom: 32px;
  }

  .info-chips {
    display: flex; gap: 10px;
    justify-content: center; flex-wrap: wrap;
    margin-bottom: 36px;
  }

  .chip {
    background: var(--teal-xlight); color: var(--teal-dark);
    padding: 6px 14px; border-radius: 20px;
    font-size: 12.5px; font-weight: 500;
    display: flex; align-items: center; gap: 5px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--teal), var(--teal-dark));
    color: white; border: none; border-radius: var(--radius-sm);
    padding: 16px 40px; font-size: 16px; font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; width: 100%;
    box-shadow: 0 4px 16px rgba(58,158,158,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(58,158,158,0.40); }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: var(--teal-xlight); color: var(--teal-dark);
    border: none; border-radius: var(--radius-sm);
    padding: 14px 28px; font-size: 14px; font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; transition: background 0.15s;
  }
  .btn-secondary:hover { background: var(--teal-light); }

  /* ─── QUESTION SCREEN ─── */
  #screen-question {
    background: linear-gradient(150deg, #EAF6F6 0%, var(--warm) 100%);
    padding-top: 0;
  }

  .q-header {
    width: 100%; max-width: 680px;
    padding: 20px 16px 0;
    position: sticky; top: 0; z-index: 10;
    background: transparent;
  }

  .progress-bar-wrap {
    background: rgba(255,255,255,0.7);
    border-radius: 24px; padding: 16px 20px;
    box-shadow: var(--shadow-sm);
    backdrop-filter: blur(6px);
  }

  .progress-meta {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }

  .progress-label { font-size: 12px; font-weight: 700; color: var(--teal); letter-spacing: 0.05em; }
  .progress-frac { font-size: 13px; font-weight: 700; color: var(--text-mid); }

  .progress-track {
    height: 8px; background: var(--teal-xlight);
    border-radius: 4px; overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal), var(--sage));
    border-radius: 4px;
    transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .q-body {
    width: 100%; max-width: 680px;
    padding: 24px 16px 48px;
    flex: 1;
  }

  .q-card {
    background: var(--white);
    border-radius: 20px;
    padding: 32px 28px;
    box-shadow: var(--shadow-md);
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--teal-xlight); color: var(--teal-dark);
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    padding: 4px 10px; border-radius: 6px; margin-bottom: 16px;
  }

  .q-situation {
    background: linear-gradient(135deg, var(--warm), #EDE0D4);
    border-left: 3px solid var(--teal);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 16px 18px; margin-bottom: 28px;
    font-size: 14px; line-height: 1.8; color: var(--text-dark);
  }

  .q-situation strong { font-size: 11px; font-weight: 700; color: var(--teal); display: block; margin-bottom: 6px; letter-spacing: 0.06em; }

  .q-choices { display: flex; flex-direction: column; gap: 10px; }

  .choice-btn {
    background: var(--white); border: 2px solid #E8ECEF;
    border-radius: var(--radius-sm); padding: 16px 18px;
    text-align: left; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px; line-height: 1.65; color: var(--text-dark);
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    display: flex; align-items: flex-start; gap: 12px;
  }

  .choice-btn:hover {
    border-color: var(--teal-light); background: var(--teal-xlight);
    transform: translateX(3px);
  }

  .choice-btn.selected {
    border-color: var(--teal); background: var(--teal-xlight);
  }

  .choice-letter {
    flex-shrink: 0;
    width: 26px; height: 26px;
    background: var(--teal-xlight); color: var(--teal-dark);
    border-radius: 6px; font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
  }

  .choice-btn.selected .choice-letter {
    background: var(--teal); color: white;
  }

  /* ─── LOADING ─── */
  #screen-loading {
    background: linear-gradient(160deg, var(--teal-xlight), var(--warm));
  }

  .loading-inner { text-align: center; }

  .spinner-ring {
    width: 72px; height: 72px; margin: 0 auto 28px;
    border: 4px solid var(--teal-light);
    border-top-color: var(--teal);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-title { font-size: 20px; font-weight: 700; color: var(--text-dark); margin-bottom: 10px; }
  .loading-sub { font-size: 14px; color: var(--text-mid); }

  .loading-dots span {
    display: inline-block; width: 8px; height: 8px;
    background: var(--teal); border-radius: 50%; margin: 0 3px;
    animation: bounce 1.2s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }

  /* ─── RESULT ─── */
  #screen-result {
    background: linear-gradient(150deg, #EAF6F6 0%, var(--warm) 100%);
    justify-content: flex-start; padding-top: 0;
  }

  .result-wrap {
    width: 100%; max-width: 680px;
    padding: 28px 16px 60px;
  }

  .result-hero {
    background: linear-gradient(135deg, var(--teal-dark), #1E6060);
    border-radius: 20px; padding: 36px 30px;
    color: white; margin-bottom: 20px;
    position: relative; overflow: hidden;
  }

  .result-hero::before {
    content: '';
    position: absolute; top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
  }

  .result-hero::after {
    content: '';
    position: absolute; bottom: -30px; right: 40px;
    width: 100px; height: 100px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
  }

  .result-eyebrow {
    font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
    color: var(--teal-light); margin-bottom: 10px;
  }

  .result-type-name {
    font-size: 28px; font-weight: 700;
    line-height: 1.3; margin-bottom: 12px;
  }

  .result-summary {
    font-size: 14px; color: rgba(255,255,255,0.85);
    line-height: 1.75;
  }

  .result-section {
    background: var(--white);
    border-radius: 16px; padding: 24px 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-sm);
  }

  .section-title {
    font-size: 13px; font-weight: 700;
    color: var(--teal); letter-spacing: 0.06em;
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 7px;
  }

  .chart-wrap { position: relative; width: 100%; max-width: 300px; margin: 0 auto; }

  .score-bars { display: flex; flex-direction: column; gap: 12px; }

  .score-row {
    display: grid; grid-template-columns: 80px 1fr 44px;
    align-items: center; gap: 12px;
  }

  .score-dim { font-size: 12.5px; font-weight: 600; color: var(--text-mid); }
  .score-track { height: 10px; background: var(--teal-xlight); border-radius: 5px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 5px; transition: width 1s cubic-bezier(0.34,1.2,0.64,1); }
  .score-pct { font-size: 12px; font-weight: 700; color: var(--teal-dark); text-align: right; }

  .tag-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }

  .tag {
    padding: 5px 12px; border-radius: 16px;
    font-size: 12px; font-weight: 600;
  }

  .tag-strength { background: var(--sage-light); color: #2D6B40; }
  .tag-growth   { background: #FFF0E6; color: #A0520F; }

  .detail-text { font-size: 14px; color: var(--text-mid); line-height: 1.8; }

  .guide-list { display: flex; flex-direction: column; gap: 10px; }

  .guide-item {
    display: flex; align-items: flex-start; gap: 12px;
    background: var(--teal-xlight); border-radius: 10px;
    padding: 14px 16px;
  }

  .guide-num {
    flex-shrink: 0; width: 24px; height: 24px;
    background: var(--teal); color: white;
    border-radius: 6px; font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
  }

  .guide-text { font-size: 13.5px; color: var(--text-dark); line-height: 1.7; }

  .action-row {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; margin-top: 24px;
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 480px) {
    .landing-card { padding: 36px 24px; }
    .landing-title { font-size: 22px; }
    .q-card { padding: 24px 18px; }
    .result-type-name { font-size: 22px; }
    .result-hero { padding: 28px 22px; }
    .action-row { grid-template-columns: 1fr; }
    .score-row { grid-template-columns: 70px 1fr 38px; }
  }
</style>
</head>
<body>

<!-- ══════════════ LANDING ══════════════ -->
<div id="screen-landing" class="screen active">
  <div class="landing-card">
    <div class="landing-icon">📋</div>
    <div class="landing-eyebrow">교사 전문성 진단도구</div>
    <h1 class="landing-title">학부모 민원 응대<br>스타일 진단검사</h1>
    <p class="landing-desc">
      20가지 실제 민원 상황에서 나라면 어떻게 대응할지 선택해 보세요.<br>
      선생님만의 응대 스타일을 분석하고, 더 효과적인 대응 방향을 안내해 드립니다.
    </p>
    <div class="info-chips">
      <span class="chip">📝 20문항</span>
      <span class="chip">⏱ 약 5분</span>
      <span class="chip">🔒 로그인 불필요</span>
    </div>
    <button class="btn-primary" onclick="startTest()">진단 시작하기 →</button>
  </div>
</div>

<!-- ══════════════ QUESTION ══════════════ -->
<div id="screen-question" class="screen">
  <div class="q-header">
    <div class="progress-bar-wrap">
      <div class="progress-meta">
        <span class="progress-label">진행 중</span>
        <span class="progress-frac" id="prog-frac">1 / 20</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="prog-fill" style="width: 5%"></div>
      </div>
    </div>
  </div>
  <div class="q-body">
    <div class="q-card" id="q-card">
      <!-- injected dynamically -->
    </div>
  </div>
</div>

<!-- ══════════════ LOADING ══════════════ -->
<div id="screen-loading" class="screen">
  <div class="loading-inner">
    <div class="spinner-ring"></div>
    <div class="loading-title">결과를 분석하는 중입니다</div>
    <p class="loading-sub">선생님의 응대 스타일을 파악하고 있어요</p>
    <div class="loading-dots" style="margin-top: 20px;">
      <span></span><span></span><span></span>
    </div>
  </div>
</div>

<!-- ══════════════ RESULT ══════════════ -->
<div id="screen-result" class="screen">
  <div class="result-wrap" id="result-wrap">
    <!-- injected dynamically -->
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════
const QUESTIONS = [
  {
    id: 1, topic: "생활지도",
    situation: "수업 중 지속적으로 떠드는 학생을 규정에 따라 뒤로 나가 서 있게 하자, 학부모가 \"우리 아이만 표적으로 삼아 혼낸 것 아니냐\"며 항의 전화를 해왔다.",
    choices: [
      { letter: "A", text: "\"속상하셨겠어요. 아이가 상황을 오해하고 상처를 받은 것 같아 저도 안타깝네요.\"", dim: "E" },
      { letter: "B", text: "\"학교 생활 규정에 따라 수업 방해 행동에 대해 모든 학생에게 동일하게 적용한 조치입니다.\"", dim: "P" },
      { letter: "C", text: "\"교사로서 교실의 면학 분위기를 조성하기 위한 저의 정당한 교육적 판단이었습니다.\"", dim: "A" },
      { letter: "D", text: "\"앞으로 아이가 수업에 집중할 수 있도록 자리 배치를 바꾸거나 추가적인 상담을 진행하겠습니다.\"", dim: "S" }
    ]
  },
  {
    id: 2, topic: "학생 갈등",
    situation: "두 학생이 다투었는데, 한 학부모가 전화를 걸어와 당장 상대방 아이를 불러내어 사과를 받아내라고 요구한다.",
    choices: [
      { letter: "A", text: "\"제가 지금 다른 업무 중이라 통화가 길어지기 어려우니, 나중에 다시 연락드리겠습니다.\"", dim: "V" },
      { letter: "B", text: "\"많이 놀라셨죠. 우리 아이가 억울하게 상처받았을까 봐 저도 걱정이 됩니다.\"", dim: "E" },
      { letter: "C", text: "\"양쪽 학생의 이야기를 모두 듣고 객관적인 사실관계를 명확히 파악하는 것이 우선입니다.\"", dim: "P" },
      { letter: "D", text: "\"내일 두 학생을 불러 화해의 자리를 마련하고, 결과가 어떻게 되었는지 안내해 드리겠습니다.\"", dim: "S" }
    ]
  },
  {
    id: 3, topic: "친구관계",
    situation: "학부모가 자신의 아이가 친한 친구와 같은 모둠이 되지 않아 학교 가기를 싫어한다며, 모둠을 변경해 달라고 요구한다.",
    choices: [
      { letter: "A", text: "\"모둠 구성은 교사의 고유 권한이며, 전체적인 학급 분위기를 고려해 심사숙고하여 결정한 것입니다.\"", dim: "A" },
      { letter: "B", text: "\"이미 공지된 학급 운영 기준에 따라 무작위로 정해진 것이라 임의로 변경할 수 없습니다.\"", dim: "P" },
      { letter: "C", text: "\"이번 모둠은 그대로 진행하되, 다음번 모둠 구성이나 활동 때 아이의 의견을 반영해 보겠습니다.\"", dim: "S" },
      { letter: "D", text: "\"친한 친구와 떨어져서 아이가 아쉬워하는 마음, 어머니께서도 신경 쓰이시는 그 마음 충분히 이해합니다.\"", dim: "E" }
    ]
  },
  {
    id: 4, topic: "성적 및 평가",
    situation: "학부모가 수행평가 결과에 대해 \"우리가 집에서 얼마나 연습했는데 점수가 이것밖에 안 되느냐\"며 불만을 제기한다.",
    choices: [
      { letter: "A", text: "\"사전에 안내해 드린 평가 루브릭과 채점 기준표에 의거하여 정확하게 채점된 결과입니다.\"", dim: "P" },
      { letter: "B", text: "\"교과 담당 교사로서 학생의 성취도를 다각도로 관찰하고 내린 전문적이고 객관적인 평가입니다.\"", dim: "A" },
      { letter: "C", text: "\"지금 당장 답안지를 확인하여 말씀드리기는 어려우니, 나중에 성적 이의 신청 기간에 다시 말씀해 주시겠어요?\"", dim: "V" },
      { letter: "D", text: "\"예상보다 점수가 낮게 나와서 아이도 어머님도 많이 실망하시고 속상하셨을 그 마음 충분히 이해가 갑니다.\"", dim: "E" }
    ]
  },
  {
    id: 5, topic: "안전사고",
    situation: "쉬는 시간에 아이가 넘어져 무릎이 까졌다. 학부모가 \"선생님은 애들 안 보고 뭐 하셨냐\"며 따져 묻는다.",

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function startTest() {
  currentQ = 0;
  answers = {};
  showScreen('screen-question');
  renderQuestion();
}

// ══════════════════════════════════════════════
// QUESTION RENDER
// ══════════════════════════════════════════════
function renderQuestion() {
  const q = QUESTIONS[currentQ];
  const pct = Math.round(((currentQ + 1) / QUESTIONS.length) * 100);

  document.getElementById('prog-frac').textContent = `${currentQ + 1} / ${QUESTIONS.length}`;
  document.getElementById('prog-fill').style.width = pct + '%';

  const card = document.getElementById('q-card');
  card.innerHTML = `
    <div class="q-badge">
      <span>Q${q.id}</span>
      <span style="opacity:.5">|</span>
      <span>${q.topic}</span>
    </div>
    <div class="q-situation">
      <strong>📌 상황</strong>
      ${q.situation}
    </div>
    <div class="q-choices">
      ${q.choices.map((c, i) => `
        <button class="choice-btn" onclick="selectAnswer(${i}, '${c.dim}')">
          <span class="choice-letter">${c.letter}</span>
          <span>${c.text}</span>
        </button>
      `).join('')}
    </div>
  `;

  // Re-trigger animation
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'fadeUp 0.3s ease';
}

function selectAnswer(choiceIdx, dim) {
  // Highlight briefly
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => b.classList.remove('selected'));
  btns[choiceIdx].classList.add('selected');

  answers[currentQ] = dim;

  setTimeout(() => {
    currentQ++;
    if (currentQ >= QUESTIONS.length) {
      showScreen('screen-loading');
      setTimeout(computeResult, 1800);
    } else {
      renderQuestion();
    }
  }, 300);
}

// ══════════════════════════════════════════════
// SCORING
// ══════════════════════════════════════════════
function computeResult() {
  const scores = { P: 0, E: 0, A: 0, S: 0, V: 0 };
  Object.values(answers).forEach(dim => { scores[dim]++; });

  const maxPossible = 16; // Each dim appears 16 times (perfectly balanced)
  const pcts = {
    P: Math.round((scores.P / maxPossible) * 100),
    E: Math.round((scores.E / maxPossible) * 100),
    A: Math.round((scores.A / maxPossible) * 100),
    S: Math.round((scores.S / maxPossible) * 100),
    V: Math.round((scores.V / maxPossible) * 100)
  };

  // Derived dimensions
  const principleScore = scores.P + scores.A;
  const cooperationScore = scores.E + scores.S;
  const avoidanceScore = scores.V;

  const principleAvg = principleScore / 2;  // max 16 each → avg, base 8
  const cooperationAvg = cooperationScore / 2;
  const principleHigh = principleAvg >= 4;
  const cooperationHigh = cooperationAvg >= 4;
  const avoidanceLow = avoidanceScore <= 2;
  const avoidanceMid = avoidanceScore > 2 && avoidanceScore <= 5;

  // Base type
  let baseType;
  if (principleHigh && cooperationHigh) baseType = "조정협력형";
  else if (principleHigh && !cooperationHigh) baseType = "원칙수호형";
  else if (!principleHigh && cooperationHigh) baseType = "관계중심형";
  else baseType = "거리두기형";

  // Modifier
  let modifier;
  if (avoidanceLow) modifier = "적극적";
  else if (avoidanceMid) modifier = "신중한";
  else modifier = (baseType === "거리두기형" ? "관망형" : "관망형");

  // For "거리두기형" mid avoidance → "전략적"
  if (baseType === "거리두기형" && avoidanceMid) modifier = "전략적";

  let typeName = modifier + " " + baseType;

  // Fallback if key not found
  if (!TYPES[typeName]) {
    // Find closest
    typeName = Object.keys(TYPES).find(k => k.includes(baseType)) || Object.keys(TYPES)[0];
  }

  renderResult(typeName, scores, pcts);
}

// ══════════════════════════════════════════════
// RESULT RENDER
// ══════════════════════════════════════════════
function renderResult(typeName, scores, pcts) {
  const t = TYPES[typeName];

  const dimLabels = { P: "원칙성", E: "공감성", A: "전문성 주장", S: "해결지향", V: "회피성" };
  const dimColors = { P: "#5B7FA6", E: "#7BAE8C", A: "#3A9E9E", S: "#6B9E6B", V: "#B88060" };

  const wrap = document.getElementById('result-wrap');
  wrap.innerHTML = `
    <div class="result-hero">
      <div class="result-eyebrow">📊 나의 민원 응대 스타일</div>
      <div class="result-type-name">${t.icon} ${typeName}</div>
      <div class="result-summary">${t.summary}</div>
    </div>

    <div class="result-section">
      <div class="section-title">📈 응대 차원별 분석</div>
      <div class="chart-wrap">
        <canvas id="radarCanvas" width="280" height="280"></canvas>
      </div>
    </div>

    <div class="result-section">
      <div class="section-title">📊 세부 점수</div>
      <div class="score-bars">
        ${Object.entries(dimLabels).map(([k, label]) => `
          <div class="score-row">
            <div class="score-dim">${label}</div>
            <div class="score-track">
              <div class="score-fill" id="fill-${k}" style="width: 0%; background: ${dimColors[k]}"></div>
            </div>
            <div class="score-pct">${pcts[k]}%</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="result-section">
      <div class="section-title">🌟 강점 & 성장 포인트</div>
      <div class="tag-row">
        ${t.strengths.map(s => `<span class="tag tag-strength">✅ ${s}</span>`).join('')}
      </div>
      <div class="tag-row">
        ${t.growth.map(g => `<span class="tag tag-growth">💡 ${g}</span>`).join('')}
      </div>
      <p class="detail-text" style="margin-top: 12px;">${t.detail}</p>
    </div>

    <div class="action-row">
      <button class="btn-secondary" onclick="startTest()">🔄 다시 검사하기</button>
      <button class="btn-primary" onclick="shareResult('${typeName}')">📤 결과 공유하기</button>
    </div>
  `;

  showScreen('screen-result');

  // Animate score bars
  setTimeout(() => {
    Object.keys(dimLabels).forEach(k => {
      const el = document.getElementById('fill-' + k);
      if (el) el.style.width = pcts[k] + '%';
    });
  }, 200);

  // Radar chart
  setTimeout(() => {
    const ctx = document.getElementById('radarCanvas').getContext('2d');
    if (radarChart) radarChart.destroy();
    radarChart = new Chart(ctx, {
      type: 'radar',
      data: {
        labels: ['원칙성', '공감성', '전문성 주장', '해결지향', '회피성'],
        datasets: [{
          data: [pcts.P, pcts.E, pcts.A, pcts.S, pcts.V],
          backgroundColor: 'rgba(58, 158, 158, 0.18)',
          borderColor: '#3A9E9E',
          borderWidth: 2.5,
          pointBackgroundColor: '#2D7D7D',
          pointRadius: 5,
          pointHoverRadius: 7
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          r: {
            beginAtZero: true,
            max: 100,
            ticks: { stepSize: 25, font: { size: 10 }, color: '#8A939E' },
            grid: { color: '#E8ECEF' },
            angleLines: { color: '#E8ECEF' },
            pointLabels: { font: { size: 11, weight: '600' }, color: '#5A6473' }
          }
        },
        animation: { duration: 800 }
      }
    });
  }, 300);
}

function shareResult(typeName) {
  if (navigator.share) {
    navigator.share({
      title: '학부모 민원 응대 스타일 진단 결과',
      text: `나의 민원 응대 스타일은 "${typeName}"입니다. 선생님도 확인해 보세요!`,
      url: window.location.href
    });
  } else {
    navigator.clipboard.writeText(
      `나의 학부모 민원 응대 스타일: "${typeName}" | 진단 링크: ${window.location.href}`
    ).then(() => {
      alert('결과 링크가 복사되었습니다! 동료 선생님들과 공유해 보세요.');
    }).catch(() => {
      alert(`나의 민원 응대 스타일: ${typeName}\n링크를 복사하여 공유해 보세요: ${window.location.href}`);
    });
  }
}
</script>
